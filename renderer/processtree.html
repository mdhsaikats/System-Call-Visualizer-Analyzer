<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Process Tree - SysTrace OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              mono: [
                "ui-monospace",
                "SFMono-Regular",
                "Menlo",
                "Monaco",
                "Consolas",
                "Liberation Mono",
                "Courier New",
                "monospace",
              ],
            },
            colors: { zinc: { 850: "#202024", 950: "#09090b" } },
            boxShadow: {
              glass: "0 4px 30px rgba(0, 0, 0, 0.5)",
              "inner-light": "inset 0 1px 0 0 rgba(255, 255, 255, 0.05)",
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }
      .bg-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(
            to right,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          );
      }
      .glass-panel {
        background: rgba(24, 24, 27, 0.6);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow:
          inset 0 1px 0 0 rgba(255, 255, 255, 0.02),
          0 4px 20px -2px rgba(0, 0, 0, 0.4);
      }
      .resizer-col {
        cursor: col-resize;
        position: relative;
      }
      .resizer-col::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 4px;
        height: 32px;
        border-radius: 2px;
        background-color: rgba(255, 255, 255, 0.1);
        transition: background-color 0.2s;
      }
      .resizer-col:hover::after {
        background-color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body
    class="bg-[#050505] text-zinc-300 font-sans antialiased h-screen w-screen overflow-hidden flex selection:bg-zinc-700 selection:text-white bg-grid"
  >
    <aside
      class="w-64 h-full glass-panel flex flex-col justify-between border-r border-white/[0.04] z-20 shrink-0"
    ></aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10">
      <header
        class="h-16 glass-panel border-b border-white/[0.04] flex items-center justify-between px-6 shrink-0"
      >
        <div class="flex items-center gap-4">
          <h1 class="text-lg font-semibold text-white tracking-tight">
            Process Hierarchy
          </h1>
          <div class="h-4 w-px bg-white/10"></div>
          <div
            class="flex bg-zinc-900/80 rounded-md p-0.5 border border-white/5"
          >
            <button
              id="btn-tree"
              class="active px-3 py-1.5 text-xs font-medium text-white bg-zinc-800 shadow-sm rounded border border-white/5 flex items-center gap-2"
            >
              <i data-lucide="list-tree" class="w-3.5 h-3.5"></i> Tree
            </button>
            <button
              id="btn-flat"
              class="px-3 py-1.5 text-xs font-medium text-zinc-500 hover:text-zinc-300 transition-colors flex items-center gap-2"
            >
              <i data-lucide="list" class="w-3.5 h-3.5"></i> Flat
            </button>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div class="relative group">
            <i
              data-lucide="search"
              class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-zinc-500 group-focus-within:text-zinc-300 transition-colors"
            ></i>
            <input
              id="pt-search"
              type="text"
              placeholder="Find process..."
              class="bg-zinc-900/50 border border-white/5 rounded-md pl-9 pr-4 py-1.5 text-xs text-zinc-200 w-64 focus:outline-none focus:ring-1 focus:ring-white/20 focus:bg-zinc-800/80 transition-all duration-250 placeholder:text-zinc-600"
            />
          </div>
          <div class="h-4 w-px bg-white/10"></div>
          <button
            id="btn-refresh"
            class="flex items-center gap-2 px-3 py-1.5 rounded-md bg-zinc-900 text-zinc-300 border border-white/10 text-xs font-medium hover:bg-zinc-800 transition-colors shadow-sm"
          >
            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Refresh
          </button>
        </div>
      </header>

      <div class="flex-1 flex min-h-0 bg-zinc-950/30">
        <div class="flex-1 overflow-auto flex flex-col relative">
          <table class="w-full text-left border-collapse min-w-max">
            <thead
              class="sticky top-0 z-20 bg-zinc-900/90 backdrop-blur-md border-b border-white/[0.08] shadow-sm text-[10px] uppercase tracking-widest text-zinc-500 font-semibold"
            >
              <tr>
                <th class="px-3 py-2.5 w-6 text-center"></th>
                <th
                  class="px-3 py-2.5 w-16 cursor-pointer hover:text-white"
                  data-sort="pid"
                >
                  PID
                </th>
                <th
                  class="px-3 py-2.5 cursor-pointer hover:text-white"
                  data-sort="name"
                >
                  Command
                </th>
                <th
                  class="px-3 py-2.5 w-28 cursor-pointer hover:text-white"
                  data-sort="cpu"
                >
                  CPU %
                </th>
                <th
                  class="px-3 py-2.5 w-16 cursor-pointer hover:text-white"
                  data-sort="memory"
                >
                  Mem %
                </th>
                <th
                  class="px-3 py-2.5 w-20 cursor-pointer hover:text-white"
                  data-sort="state"
                >
                  State
                </th>
                <th
                  class="px-3 py-2.5 w-24 cursor-pointer hover:text-white"
                  data-sort="user"
                >
                  User
                </th>
              </tr>
            </thead>
            <tbody id="proc-list" class="divide-y divide-white/[0.02]"></tbody>
          </table>
        </div>

        <div
          class="w-1 bg-zinc-900 border-l border-r border-white/[0.04] resizer-col z-20 shrink-0"
        ></div>

        <div class="w-[380px] glass-panel border-l-0 flex flex-col shrink-0">
          <div
            id="pt-sidebar-content"
            class="flex-1 overflow-y-auto p-5 space-y-4"
          >
            <p class="text-zinc-600 font-mono text-[11px] text-center mt-10">
              Select a process<br />to see details
            </p>
          </div>
        </div>
      </div>
    </main>

    <script src="js/processtree.js"></script>
  </body>
</html>
